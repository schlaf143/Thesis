<!DOCTYPE html>
<html lang="en">
{% extends 'base.html' %}
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
</head>
<body>
    {% block content %}
        <h1>Register New Log In Credentials</h1>
        <hr>
        <div class="d-flex">
            <form method="post" class="d-flex flex-column p-3 border border-1 border-dark-subtle rounded flex-grow-1">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary">Register</button>
            </form>
        </div>
    {% endblock %}
</body>
</html>
