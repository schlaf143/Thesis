{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!----======== CSS ======== -->
    <link rel="stylesheet" href="{% static 'bootstrap/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/flatpickr.min.css' %}">
    <!----===== Boxicons CSS ===== -->
    <link href='https://unpkg.com/boxicons@2.1.1/css/boxicons.min.css' rel='stylesheet'>
    
    <!-- JS Files -->
    <script src="{% static 'js/htmx.min.js' %}"></script>
    <script src="{% static 'bootstrap/js/bootstrap.bundle.min.js' %}"></script>
    <script src="{% static 'js/flatpickr.js' %}"></script>
    <script src="{% static 'js/flatpickr_init.js' %}"></script>
</head>
<body>  
    <div class="container-fluid vh-100">
        <div class="row h-100">

            {% if user.is_authenticated %}

            <!-- Sidebar -->
            <nav class="col-12 col-md-3 col-lg-2 bg-dark text-light d-flex flex-column p-2">
                <div class="text-center mb-4">
                    <!-- <img src="{% static 'assets/logo.png' %}" alt="Logo" class="img-fluid rounded-circle mb-3" style="max-width: 80px;"> -->
                    <h4>Workfore Monitoring</h4>
                </div>
                <hr>


                    <ul class="nav flex-column nav-pills">
                        <li class="nav-item">
                          <a class="nav-link text-light" aria-current="page" href="{% url 'dashboard' %}">
                            Dashboard<i class='bx bx-home-alt ms-2'></i></a>
                        </li>

                        <li class="nav-item">

                          <button class="nav-link text-light " type="button" data-bs-toggle="collapse" data-bs-target="#manageEmpCollapse" aria-expanded="false" aria-controls="manageEmpCollapse">
                            </i>Manage Employees<i class='bx bxs-down-arrow ms-2'></i></button>
                            
                          <div class="collapse multi-collapse" id="manageEmpCollapse">
                            <div class="list-group  p-3">
                                <a href="{% url 'view_employee_list' %}" class="list-group-item list-group-item-action">View Employee List</a>
                                <a href="{% url 'register_login' %}" class="list-group-item list-group-item-action">Add Login</a>
                              </div>
                          </div>
                        </li>
                        <li class="nav-item">
                            <!-- <a class="" href="#">Link</a> -->
                            <button class="nav-link text-light " type="button" data-bs-toggle="collapse" data-bs-target="#manageShftCollapse" aria-expanded="false" aria-controls="manageShftCollapse">
                            Manage Shifts<i class='bx bxs-down-arrow ms-2'></i></button>
                            <div class="collapse multi-collapse" id="manageShftCollapse">
                                <div class="list-group  p-3">
                                    <a href="#" class="list-group-item list-group-item-action">View Shift Schedule</a>
                                    <a href="#" class="list-group-item list-group-item-action">Set Shifts for Employee</a>
                                  </div>
                              </div>
                          </li>

                          <li class="nav-item">
                            <a class="nav-link text-light" aria-current="page" href="{ % url 'dashboard' % }">
                              Leave Requests<i class='bx bx-home-alt ms-2'></i></a>
                          </li>

                      </ul>

                <!-- </ul> -->
                <div class="mt-auto">
                    <a href="{% url 'logout' %}" class="btn btn-danger w-100">Logout</a>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="col-12 col-md-9 col-lg-10 bg-light p-4">

                <div class="bg-white p-4 rounded shadow w-100 h-100 border border-dark-subtle">
                    {% block content %}

                    {% endblock %}
                </div>
            </main>

            {% else %}
            <!-- <nav class="col-12 col-md-3 col-lg-2 bg-dark text-light d-flex flex-column p-2"> -->
                <div class="d-flex h-100 w-100 p-5 justify-content-center align-items-center flex-column gap-2">
                    
                    <div class="border border-1 border-dark-subtle p-4 rounded  d-flex flex-column">
                        <h1>Login</h1>
                        <div class="">
                            <form action="{% url 'login' %}" method="post" class="d-flex flex-column gap-2">
                                {% csrf_token %}
                                <div class="form-group">
                                    <label for="username">Username</label>
                                    <input type="text" name="username" class="form-control" required>
                                </div>
                                <div class="form-group">
                                    <label for="password">Password</label>
                                    <input type="password" name="password" class="form-control" required>
                                </div>
                                <button type="submit" class="btn btn-primary">Login</button>
                            </form>
                    </div>
                </div>
                
            <!-- </nav> -->
            
            
            
            {% endif %}

            
        </div>
            
        </div>
    </div>


</body>
</html>
